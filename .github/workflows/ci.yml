name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu cek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bagimliliklari yukle
        run: npm ci

      - name: Prisma Client uret
        run: npx prisma generate

      - name: Tip kontrolu
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Birim testleri
        run: npm test
