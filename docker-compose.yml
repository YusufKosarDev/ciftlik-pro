services:
  db:
    image: postgres:16-alpine
    container_name: ciftlik_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ciftlik_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Tek seferlik: migration'lari uygular + idempotent admin bootstrap'i yapar, sonra cikar.
  migrate:
    build:
      context: .
      target: migrator
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      # Pooler olmadigi icin migration'larin DIRECT_URL'i ile ayni.
      DIRECT_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      # Bos veritabaninda ilk yoneticiyi olusturmak icin (idempotent).
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
    restart: "no"

  app:
    build:
      context: .
      target: runner
    container_name: ciftlik_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      # Once migration'lar tamamlansin, sonra app baslasin.
      migrate:
        condition: service_completed_successfully
    environment:
      # Container icinden DB'ye Docker agi uzerinden baglanilir (db:5432)
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      DIRECT_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      AUTH_SECRET: ${AUTH_SECRET}
      # Bos veritabaninda olusturulacak ilk yonetici (idempotent).
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
    ports:
      - "3000:3000"

volumes:
  ciftlik_db_data:
